<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome // Robo Manipal Electronics</title>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&family=Syncopate:wght@400;700&display=swap"
        rel="stylesheet" />

    <style>
        :root {
            --bg: #030303;
            --card-bg: rgba(10, 10, 10, 0.4);
            --text: #e0e0e0;
            --accent: #ff003c;
            --accent-2: #00f3ff;
            --border: rgba(255, 255, 255, 0.1);
            --font-display: 'Syncopate', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-display);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            cursor: crosshair;
        }

        .scanlines {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom,
                    rgba(255, 255, 255, 0),
                    rgba(255, 255, 255, 0) 50%,
                    rgba(0, 0, 0, 0.2) 50%,
                    rgba(0, 0, 0, 0.2));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }

        .vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, transparent 40%, #000 120%);
            z-index: 11;
            pointer-events: none;
        }

        .noise {
            position: fixed;
            inset: 0;
            z-index: 12;
            opacity: 0.07;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .hud {
            position: fixed;
            inset: 2rem;
            z-index: 20;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-family: var(--font-code);
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
        }

        .hud-top,
        .hud-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hud strong {
            color: var(--accent-2);
        }

        .hud-line {
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
            margin: 0 1rem;
            position: relative;
        }

        .hud-line::after {
            content: '';
            position: absolute;
            right: 0;
            top: -2px;
            width: 5px;
            height: 5px;
            background: var(--accent);
        }

        .center-nav {
            align-self: flex-start;
            margin-top: auto;
            margin-bottom: auto;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
        }

        .viewport {
            position: fixed;
            inset: 0;
            perspective: 1000px;
            overflow: hidden;
            z-index: 1;
        }

        .world {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .item {
            position: absolute;
            left: 0;
            top: 0;
            backface-visibility: hidden;
            transform-origin: center center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            width: 320px;
            height: 460px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            position: relative;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.5), 0 20px 50px rgba(0, 0, 0, 0.5);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            transform: translate(-50%, -50%);
        }

        @media (hover: hover) {
            .card:hover {
                border-color: var(--accent);
                box-shadow: 0 0 30px rgba(255, 0, 60, 0.2);
                background: rgba(20, 20, 20, 0.8);
                z-index: 100;
            }
        }

        .card::before,
        .card::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .card::before {
            top: -1px;
            left: -1px;
            border-top-color: var(--text);
            border-left-color: var(--text);
        }

        .card::after {
            bottom: -1px;
            right: -1px;
            border-bottom-color: var(--text);
            border-right-color: var(--text);
        }

        .card:hover::before,
        .card:hover::after {
            width: 100%;
            height: 100%;
            border-color: var(--accent);
        }

        .card-header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-id {
            font-family: var(--font-code);
            color: var(--accent);
            font-size: 0.8rem;
        }

        .card h2 {
            font-size: 2.5rem;
            line-height: 0.9;
            margin: 0;
            text-transform: uppercase;
            font-weight: 700;
            color: #fff;
            mix-blend-mode: hard-light;
        }

        .card-footer {
            margin-top: auto;
            font-family: var(--font-code);
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .big-text {
            font-size: 15vw;
            font-weight: 800;
            color: transparent;
            -webkit-text-stroke: 2px rgba(255, 255, 255, 0.15);
            text-transform: uppercase;
            white-space: nowrap;
            transform: translate(-50%, -50%);
            pointer-events: none;
            letter-spacing: -0.5rem;
            mix-blend-mode: overlay;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            transform: translate(-50%, -50%);
        }

        .scroll-proxy {
            height: 10000vh;
            position: absolute;
            width: 100%;
            z-index: -1;
        }

        .made-by {
            position: fixed;
            left: 50%;
            bottom: 10px;
            transform: translateX(-50%);
            z-index: 30;
            font-family: var(--font-code);
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.58);
            text-shadow: 0 0 8px rgba(0, 243, 255, 0.2);
            pointer-events: none;
        }

        .welcome-banner {
            position: fixed;
            z-index: 25;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: min(92vw, 900px);
            pointer-events: none;
            text-align: center;
            text-transform: uppercase;
        }

        .welcome-banner h1 {
            margin: 0;
            font-size: clamp(1.2rem, 4vw, 2.5rem);
            letter-spacing: 0.12em;
            color: rgba(255, 255, 255, 0.88);
            text-shadow: 0 0 18px rgba(0, 243, 255, 0.25);
        }

        .welcome-banner h1 strong {
            color: var(--accent-2);
        }

        .welcome-banner p {
            margin-top: 0.7rem;
            font-family: var(--font-code);
            font-size: clamp(0.68rem, 1.5vw, 0.82rem);
            letter-spacing: 0.16em;
            color: rgba(255, 255, 255, 0.66);
        }

        @media (max-width: 640px) {
            .hud {
                inset: 1rem;
            }

            .card {
                width: min(300px, 82vw);
                height: min(430px, 70vh);
                padding: 1.3rem;
            }

            .card h2 {
                font-size: 2rem;
            }

            .big-text {
                letter-spacing: -0.2rem;
            }
        }
    </style>
</head>

<body>
    <div class="scanlines"></div>
    <div class="vignette"></div>
    <div class="noise"></div>

    <div class="hud">
        <div class="hud-top">
            <span>SYS.READY</span>
            <div class="hud-line"></div>
            <span>FPS: <strong id="fps">60</strong></span>
        </div>
        <div class="center-nav">
            SCROLL VELOCITY // <strong id="vel-readout">0.00</strong>
        </div>
        <div class="hud-bottom">
            <span>COORD: <strong id="coord">000.000</strong></span>
            <div class="hud-line"></div>
            <span>ROBO MANIPAL // ELECTRONICS</span>
        </div>
    </div>

    <div class="welcome-banner">
        <h1>Welcome to <strong>Robo Manipal Electronics</strong></h1>
        <p>Build. Test. Iterate. Compete. The game begins now.</p>
    </div>

    <div class="viewport" id="viewport">
        <div class="world" id="world"></div>
    </div>

    <div class="scroll-proxy"></div>
    <div class="made-by">Made by Dhruv Dabur</div>
    <audio id="bgMusic" src="pubg_remix.mp3" loop preload="auto"></audio>

    <script>
        const CONFIG = {
            itemCount: 20,
            starCount: 150,
            zGap: 800,
            loopSize: 0,
            camSpeed: 2.5,
            colors: ['#ff003c', '#00f3ff', '#ccff00', '#ffffff']
        };
        CONFIG.loopSize = CONFIG.itemCount * CONFIG.zGap;

        const TEXTS = [
            'WELCOME',
            'ROBO',
            'MANIPAL',
            'ELECTRONICS',
            'SYSTEM',
            'FUTURE',
            'DESIGN',
            'HYPER',
            'SENSORS',
            'CIRCUITS'
        ];

        const state = {
            scroll: 0,
            velocity: 0,
            targetSpeed: 0,
            mouseX: 0,
            mouseY: 0
        };

        const world = document.getElementById('world');
        const viewport = document.getElementById('viewport');
        const items = [];
        const bgMusic = document.getElementById('bgMusic');

        function startMusic() {
            bgMusic.volume = 0.45;
            bgMusic.play().catch(() => { });
        }

        function init() {
            for (let i = 0; i < CONFIG.itemCount; i++) {
                const el = document.createElement('div');
                el.className = 'item';

                const isHeading = i % 4 === 0;

                if (isHeading) {
                    const txt = document.createElement('div');
                    txt.className = 'big-text';
                    txt.innerText = TEXTS[i % TEXTS.length];
                    el.appendChild(txt);
                    items.push({
                        el,
                        type: 'text',
                        x: 0,
                        y: 0,
                        rot: 0,
                        baseZ: -i * CONFIG.zGap
                    });
                } else {
                    const card = document.createElement('div');
                    card.className = 'card';
                    const randId = Math.floor(Math.random() * 9999);
                    card.innerHTML = `
                        <div class="card-header">
                            <span class="card-id">ID-${randId}</span>
                            <div style="width: 10px; height: 10px; background: var(--accent);"></div>
                        </div>
                        <h2>${TEXTS[i % TEXTS.length]}</h2>
                        <div class="card-footer">
                            <span>GRID: ${Math.floor(Math.random() * 10)}x${Math.floor(Math.random() * 10)}</span>
                            <span>DATA_SIZE: ${(Math.random() * 100).toFixed(1)}MB</span>
                        </div>
                        <div style="position:absolute; bottom:2rem; right:2rem; font-size:4rem; opacity:0.1; font-weight:900;">0${i}</div>
                    `;
                    el.appendChild(card);

                    const angle = (i / CONFIG.itemCount) * Math.PI * 6;
                    const radius = 400 + Math.random() * 200;
                    const x = Math.cos(angle) * (window.innerWidth * 0.3);
                    const y = Math.sin(angle) * (window.innerHeight * 0.3);
                    const rot = (Math.random() - 0.5) * 30;

                    items.push({
                        el,
                        type: 'card',
                        x,
                        y,
                        rot,
                        baseZ: -i * CONFIG.zGap
                    });
                }
                world.appendChild(el);
            }

            for (let i = 0; i < CONFIG.starCount; i++) {
                const el = document.createElement('div');
                el.className = 'star';
                world.appendChild(el);
                items.push({
                    el,
                    type: 'star',
                    x: (Math.random() - 0.5) * 3000,
                    y: (Math.random() - 0.5) * 3000,
                    baseZ: -Math.random() * CONFIG.loopSize
                });
            }

            window.addEventListener('mousemove', (e) => {
                state.mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
                state.mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
            });
        }
        init();
        startMusic();

        ['click', 'touchstart', 'keydown'].forEach((eventName) => {
            document.addEventListener(eventName, startMusic, { once: true });
        });

        const lenis = new Lenis({
            smooth: true,
            lerp: 0.08,
            direction: 'vertical',
            gestureDirection: 'vertical',
            smoothTouch: true
        });

        lenis.on('scroll', ({ scroll, velocity }) => {
            state.scroll = scroll;
            state.targetSpeed = velocity;
        });

        const feedbackVel = document.getElementById('vel-readout');
        const feedbackFPS = document.getElementById('fps');
        let lastTime = 0;

        function raf(time) {
            lenis.raf(time);

            const delta = time - lastTime;
            lastTime = time;
            if (time % 10 < 1 && delta > 0) {
                feedbackFPS.innerText = Math.round(1000 / delta);
            }

            state.velocity += (state.targetSpeed - state.velocity) * 0.1;
            feedbackVel.innerText = Math.abs(state.velocity).toFixed(2);
            document.getElementById('coord').innerText = `${state.scroll.toFixed(0)}`;

            const tiltX = state.mouseY * 5 - state.velocity * 0.5;
            const tiltY = state.mouseX * 5;

            world.style.transform = `
                rotateX(${tiltX}deg)
                rotateY(${tiltY}deg)
            `;

            const baseFov = 1000;
            const fov = baseFov - Math.min(Math.abs(state.velocity) * 10, 600);
            viewport.style.perspective = `${fov}px`;

            const cameraZ = state.scroll * CONFIG.camSpeed;

            items.forEach((item) => {
                const relZ = item.baseZ + cameraZ;
                const modC = CONFIG.loopSize;

                let vizZ = ((relZ % modC) + modC) % modC;
                if (vizZ > 500) {
                    vizZ -= modC;
                }

                let alpha = 1;
                if (vizZ < -3000) {
                    alpha = 0;
                } else if (vizZ < -2000) {
                    alpha = (vizZ + 3000) / 1000;
                }

                if (vizZ > 100 && item.type !== 'star') {
                    alpha = 1 - ((vizZ - 100) / 400);
                }

                if (alpha < 0) {
                    alpha = 0;
                }
                item.el.style.opacity = alpha;

                if (alpha > 0) {
                    let trans = `translate3d(${item.x}px, ${item.y}px, ${vizZ}px)`;

                    if (item.type === 'star') {
                        const stretch = Math.max(1, Math.min(1 + Math.abs(state.velocity) * 0.1, 10));
                        trans += ` scale3d(1, 1, ${stretch})`;
                    } else if (item.type === 'text') {
                        trans += ` rotateZ(${item.rot}deg)`;
                        if (Math.abs(state.velocity) > 1) {
                            const offset = state.velocity * 2;
                            item.el.style.textShadow = `${offset}px 0 red, ${-offset}px 0 cyan`;
                        } else {
                            item.el.style.textShadow = 'none';
                        }
                    } else {
                        const t = time * 0.001;
                        const float = Math.sin(t + item.x) * 10;
                        trans += ` rotateZ(${item.rot}deg) rotateY(${float}deg)`;
                    }

                    item.el.style.transform = trans;
                }
            });

            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);
    </script>
</body>

</html>
